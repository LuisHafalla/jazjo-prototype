<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop | Jazjo</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script defer src="../assets/js/app.js"></script>
</head>
<body>
  <div class="navPublic">
    <div class="navInner">
      <div class="brand"><div class="logoDot">J</div><div>Jazjo Beverage</div></div>
      <div class="navLinks">
        <a href="customer-dashboard.html">Home</a>
        <a href="customer-shop.html">Shop</a>
        <a href="customer-orders.html">Orders</a>
        <a href="customer-rewards.html">Rewards</a>
        <a class="btn back" href="customer-cart.html">Cart (<span data-cart-count>0</span>)</a>
        <a class="btn" href="../index.html">Log Out</a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Shop</h1>
        <p>Search products and add to cart.</p>
      </div>
      <button class="btn back" data-back>← Back</button>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="grid grid2">
        <div>
          <label class="small">Search</label>
          <input id="search" class="input" placeholder="Search product name or category..." />
        </div>
        <div>
          <label class="small">Category</label>
          <select id="category"></select>
        </div>
      </div>
    </div>

    <div id="favoritesCard" class="card" style="margin-top:14px">
      <div class="row" style="justify-content:space-between">
        <div>
          <div style="font-weight:1100;font-size:18px">Saved Items</div>
          <div class="small">Quick access to products you want to reorder.</div>
        </div>
        <span class="badge">Favorites</span>
      </div>
      <div id="favoritesGrid" class="productGrid productGrid-compact" style="margin-top:14px"></div>
    </div>

    <div id="recommendCard" class="card" style="margin-top:14px">
      <div class="row" style="justify-content:space-between">
        <div>
          <div style="font-weight:1100;font-size:18px">Recommended For You</div>
          <div class="small">Based on the items you order repeatedly.</div>
        </div>
        <span class="badge green">Suggested</span>
      </div>
      <div id="recommendGrid" class="productGrid productGrid-compact" style="margin-top:14px"></div>
    </div>

    <div id="productGrid" class="productGrid" style="margin-top:14px"></div>
  </div>
</body>
</html>
